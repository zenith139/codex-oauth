services:
  codex-oauth:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: codex-oauth
    user: "0:0"
    ports:
      - "${APP_PORT:-4318}:4318"
      - "1455:1455"
    volumes:
      - codex-home:/home/codex/.codex
    restart: unless-stopped
    # entrypoint: ["tail", "-f", "/dev/null"]

volumes:
  codex-home:
